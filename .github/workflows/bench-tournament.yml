name: bench-tournament
# Free coding-model tournament on a free GitHub-hosted runner (RULE-GHA-FIRST-01).
# Zero-dependency Node + cached lightweight Docker sandbox. Validates results before deploy so a
# failed/empty run NEVER overwrites the server's last-good leaderboard on bench.evotop.pro.
on:
  schedule:
    - cron: '0 4 * * 1'   # weekly, Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bench-tournament
  cancel-in-progress: false

jobs:
  tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      # bench-run.mjs is ZERO-dependency -> no npm install, nothing to cache for node.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Cache the sandbox image tarball (super-rule: actions/cache, minimize build time).
      - name: Cache sandbox image
        uses: actions/cache@v5
        with:
          path: ~/sandbox-img.tar
          key: sandbox-python-3.12-alpine-v1

      - name: Load or pull sandbox image
        run: |
          if [ -f ~/sandbox-img.tar ]; then
            docker load -i ~/sandbox-img.tar
          else
            docker pull python:3.12-alpine
            docker save python:3.12-alpine -o ~/sandbox-img.tar
          fi

      # Full 10-model coverage: provider-free (Gemini/Groq) is Poland-localhost (:3031), unreachable
      # from a cloud runner. We reach it through an SSH local-forward over the SAME key already used for
      # the scp deploy — no new public exposure, no new secret, no nginx change. HF models go direct.
      - name: Open SSH tunnel to Poland provider-free (:3031)
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/poland_key
          chmod 600 ~/.ssh/poland_key
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ExitOnForwardFailure=yes \
              -i ~/.ssh/poland_key -fN -L 3031:127.0.0.1:3031 \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" || echo "ssh tunnel launch failed"
          up=no
          for i in $(seq 1 10); do
            if curl -sf --max-time 3 http://127.0.0.1:3031/health >/dev/null 2>&1; then up=yes; break; fi
            sleep 1
          done
          echo "tunnel_up=$up"
          [ "$up" = yes ] && echo "provider-free reachable via tunnel" \
            || echo "::warning::provider-free tunnel down — its 4 models will error this run; the 6 HF models are unaffected"

      - name: Run tournament (all 10 — HF direct + provider-free via tunnel)
        env:
          FREE_KEY: ${{ secrets.FREE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # FREE_URL defaults to http://127.0.0.1:3031 -> the SSH-forwarded port. No BENCH_BACKENDS filter => all 10 models.
          SANDBOX_IMG: python:3.12-alpine
          RESULTS_PATH: results.json
        run: node bench/bench-run.mjs

      # GATE: validate JSON before sending — a broken/empty result must NOT overwrite the server copy.
      - name: Validate results.json
        id: validate
        run: |
          if node -e "const d=require('./results.json'); if(!Array.isArray(d.results)||!d.results.length) process.exit(1); if(d.results.filter(r=>r.passed>0).length===0) process.exit(1);"; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "results.json OK: $(node -e "console.log(require('./results.json').results.length)") models"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::results.json invalid/empty — SKIPPING deploy, server keeps last-good leaderboard"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: results.json
          if-no-files-found: warn

      - name: Deploy results.json to Poland dashboard (only if valid)
        if: steps.validate.outputs.valid == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: results.json
          target: /opt/bench/
# Coverage: all 10 models run from GHA — 6 HF-Router models direct, 4 provider-free (Gemini/Groq) via the
# SSH tunnel to Poland :3031. If the tunnel is down the 4 provider-free models error but the run still
# publishes (HF models + JSON gate). model-watcher stays local on Poland cron (super-rule, not migrated).
